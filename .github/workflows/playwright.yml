name: 🎭 Playwright Tests

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  pull_request:
    paths:
      - "app/**"
      - "components/**"
      - "src/**"
      - "scripts/**"
      - "public/**"
      - "test/**"
      - "docker-compose.yml"
      - "bun.lock"
      - "package.json"
      - "*config.*"
  push:
    paths:
      - "app/**"
      - "components/**"
      - "src/**"
      - "scripts/**"
      - "public/**"
      - "test/**"
      - "docker-compose.yml"
      - "bun.lock"
      - "package.json"
      - "*config.*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      DATABASE_URL: postgres://raspi:raspi@127.0.0.1:54322/raspi_signage
      BETTER_AUTH_SECRET: ci-better-auth-secret-not-for-production
      BETTER_AUTH_URL: http://localhost:3000
      NEXT_PUBLIC_APP_URL: http://localhost:3000
      STORAGE_PROVIDER: s3
      S3_ENDPOINT: http://127.0.0.1:9000
      S3_REGION: us-east-1
      S3_ACCESS_KEY_ID: rustfsadmin
      S3_SECRET_ACCESS_KEY: rustfsadmin
      S3_BUCKET: signage-contents
      S3_PUBLIC_BASE_URL: http://127.0.0.1:9000/signage-contents

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: 🐣 Install bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: canary

      - name: 📦 Install dependencies
        run: bun i

      # Bring up Postgres + RustFS via the same docker-compose.yml used for
      # local development, so CI matches developer environments exactly.
      # `--wait` blocks until the postgres healthcheck passes.
      - name: 🐳 Start Postgres + RustFS
        run: docker compose up -d --wait

      - name: 🪣 Apply schema, ensure bucket, and seed
        run: bun scripts/db-bootstrap.ts

      - name: 🎭 Install Playwright Browsers
        run: bun playwright install --with-deps

      - name: 🧪 Run Playwright tests
        run: bun playwright test

      - name: 🆙 Upload Test Report
        uses: actions/upload-artifact@v7
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30

      - name: 🛑 Stop containers
        if: always()
        run: docker compose down -v
