name: 🎭 Playwright Tests

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  pull_request:
    paths:
      - "app/**"
      - "components/**"
      - "utilities/**"
      - "src/**"
      - "public/**"
      - "test/**"
      - "bun.lock"
      - "package.json"
      - "*config.*"
  push:
    paths:
      - "app/**"
      - "components/**"
      - "utilities/**"
      - "src/**"
      - "public/**"
      - "test/**"
      - "bun.lock"
      - "package.json"
      - "*config.*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: 🐣 Install bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: canary

      - name: 📦 Install dependencies
        run: bun i

      - name: 🐳 Start Supabase
        run: |
          bunx supabase start
          bunx supabase db reset
          echo "NEXT_PUBLIC_SUPABASE_URL=$(bunx supabase status --output json | jq -r '.API_URL')" >> "$GITHUB_ENV"
          echo "NEXT_PUBLIC_SUPABASE_ANON_KEY=$(bunx supabase status --output json | jq -r '.ANON_KEY')" >> "$GITHUB_ENV"
          echo "SUPABASE_SERVICE_ROLE_KEY=$(bunx supabase status --output json | jq -r '.SERVICE_ROLE_KEY')" >> "$GITHUB_ENV"

      - name: 🎭 Install Playwright Browsers
        run: bun playwright install --with-deps

      - name: 🧪 Run Playwright tests
        run: bun playwright test

      - name: 🆙 Upload Test Report
        uses: actions/upload-artifact@v7
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30
