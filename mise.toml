[tools]
bun = "latest"
rumdl = "latest"
pitchfork = "latest"

[tasks.lint]
run = ["bun lint:fix --unsafe", "mise lint:md"]

[tasks."lint:md"]
description = "Check and fix markdown files with rumdl"
run = "rumdl check --fix ."

[tasks."fmt:md"]
description = "Format markdown files with rumdl"
run = "rumdl fmt ."

[tasks."local:env"]
description = "Generate .env for local Postgres + RustFS"
run = "bun scripts/local-env.ts"

[tasks."local:up"]
description = "Start local Postgres + RustFS via docker compose"
run = "docker compose up -d"

[tasks."local:down"]
description = "Stop local Postgres + RustFS containers"
run = "docker compose down"

[tasks."db:migrate"]
description = "Apply src/db/schema.sql to the configured database"
run = "bun scripts/db-migrate.ts"

[tasks."db:seed"]
description = "Seed accounts (via Better Auth) and signage data"
run = "bun scripts/db-seed.ts"

[tasks."db:reset"]
description = "Re-apply schema, ensure bucket, and re-seed (truncates app tables)"
run = "bun scripts/db-bootstrap.ts"

[tasks.update]
description = "Update bun dependencies and reinstall"
run = ["bun update", "bun i", "mise deps"]

[deps.bun]
auto = true

[hooks]
enter = ["mise upgrade -q", "mise deps -q"]

[settings]
experimental = true
